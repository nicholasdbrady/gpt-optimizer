<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GPT Prompt Optimizer</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
    }
    header {
      text-align: center;
      padding: 2rem 1rem 1.5rem;
      border-bottom: 1px solid #0f3460;
    }
    header h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.5px; }
    header p { color: #8899aa; margin-top: 0.4rem; font-size: 0.95rem; }
    .app {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      max-width: 1400px;
      margin: 1.5rem auto;
      padding: 0 1.5rem;
    }
    @media (max-width: 900px) { .app { grid-template-columns: 1fr; } }
    .panel {
      background: #16213e;
      border-radius: 12px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .panel h2 { font-size: 1.1rem; color: #8899aa; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
    label { font-size: 0.85rem; color: #8899aa; display: block; margin-bottom: 0.3rem; }
    textarea {
      width: 100%;
      min-height: 200px;
      background: #0d1b33;
      border: 1px solid #0f3460;
      border-radius: 8px;
      color: #eee;
      padding: 0.8rem;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.9rem;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: #e94560; }
    select, input[type="text"] {
      width: 100%;
      background: #0d1b33;
      border: 1px solid #0f3460;
      border-radius: 8px;
      color: #eee;
      padding: 0.6rem 0.8rem;
      font-size: 0.9rem;
      outline: none;
    }
    select:focus, input[type="text"]:focus { border-color: #e94560; }
    .row { display: flex; gap: 1rem; flex-wrap: wrap; }
    .row > * { flex: 1; min-width: 120px; }

    /* Segmented control */
    .seg-control {
      display: inline-flex;
      background: #0d1b33;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #0f3460;
      width: 100%;
    }
    .seg-control input { display: none; }
    .seg-control label {
      flex: 1;
      text-align: center;
      padding: 0.55rem 0;
      cursor: pointer;
      font-size: 0.85rem;
      color: #8899aa;
      transition: all 0.2s;
      margin: 0;
      user-select: none;
    }
    .seg-control input:checked + label {
      background: #0f3460;
      color: #eee;
      font-weight: 600;
    }

    /* Check buttons */
    .checks { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .check-btn {
      background: #0d1b33;
      border: 1px solid #0f3460;
      border-radius: 8px;
      color: #8899aa;
      padding: 0.45rem 0.8rem;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .check-btn:hover { border-color: #e94560; color: #eee; }
    .check-btn.active { background: #0f3460; color: #eee; border-color: #e94560; }

    /* Buttons */
    .btn-primary {
      background: #0f3460;
      color: #eee;
      border: none;
      border-radius: 8px;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      width: 100%;
    }
    .btn-primary:hover { background: #1a4a8a; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-copy {
      background: transparent;
      border: 1px solid #0f3460;
      color: #8899aa;
      border-radius: 8px;
      padding: 0.4rem 1rem;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-copy:hover { border-color: #e94560; color: #eee; }

    /* Output */
    .summary-banner {
      background: #0d1b33;
      border-left: 4px solid #e94560;
      border-radius: 0 8px 8px 0;
      padding: 0.8rem 1rem;
      font-size: 0.9rem;
      line-height: 1.5;
    }
    .comment-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
    .comment-item {
      background: #0d1b33;
      border-radius: 8px;
      padding: 0.7rem 0.9rem;
      font-size: 0.88rem;
      line-height: 1.45;
      display: flex;
      gap: 0.6rem;
      align-items: flex-start;
    }
    .comment-icon { flex-shrink: 0; font-size: 1rem; }
    .output-block {
      background: #0d1b33;
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 0.8rem;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.88rem;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.5;
      max-height: 400px;
      overflow-y: auto;
      color: #cde;
    }
    .output-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* Spinner */
    .spinner-wrap { text-align: center; padding: 3rem 0; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 36px; height: 36px;
      border: 3px solid #0f3460;
      border-top-color: #e94560;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .spinner-text { margin-top: 0.8rem; color: #8899aa; font-size: 0.9rem; }

    /* Error */
    .error-banner {
      background: rgba(233, 69, 96, 0.12);
      border: 1px solid #e94560;
      border-radius: 8px;
      padding: 0.8rem 1rem;
      color: #e94560;
      font-size: 0.9rem;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: #556677;
    }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 0.8rem; }
    .empty-state p { font-size: 0.95rem; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useCallback } = React;

    const MODELS = ['gpt-5.4', 'gpt-5.2', 'gpt-5.1', 'gpt-5', 'o3'];
    const MODES = [
      { value: 'instant', label: 'Instant' },
      { value: 'default', label: 'Default' },
      { value: 'pro',     label: 'Pro' },
    ];
    const CHECKS = [
      { value: 'conflicting_instructions', label: 'Conflicts' },
      { value: 'ambiguity',                label: 'Ambiguity' },
      { value: 'output_format',            label: 'Output Format' },
    ];

    function App() {
      const [prompt, setPrompt]               = useState('');
      const [model, setModel]                 = useState('gpt-5.4');
      const [mode, setMode]                   = useState('default');
      const [presetCheck, setPresetCheck]      = useState(null);
      const [customInstruction, setCustom]     = useState('');
      const [loading, setLoading]             = useState(false);
      const [error, setError]                 = useState(null);
      const [result, setResult]               = useState(null);
      const [copied, setCopied]               = useState(false);

      const toggleCheck = (val) => setPresetCheck(prev => prev === val ? null : val);

      const optimize = useCallback(async () => {
        if (!prompt.trim()) return;
        setLoading(true);
        setError(null);
        setResult(null);
        setCopied(false);

        const body = {
          developer_message: prompt,
          model_name: model,
          optimizer_mode: mode,
          optimizing_for: model,
          messages: [{ role: 'user', content: '' }],
          tools: [],
        };
        if (presetCheck) body.preset_check = presetCheck;
        if (customInstruction.trim()) body.requested_changes = customInstruction.trim();

        try {
          const res = await fetch('/api/optimize', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          });
          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.error || `HTTP ${res.status}`);
          }
          setResult(await res.json());
        } catch (e) {
          setError(e.message || 'Something went wrong');
        } finally {
          setLoading(false);
        }
      }, [prompt, model, mode, presetCheck, customInstruction]);

      const copyOutput = () => {
        if (!result?.new_developer_message) return;
        navigator.clipboard.writeText(result.new_developer_message).then(() => {
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        });
      };

      return (
        <>
          <header>
            <h1>GPT Prompt Optimizer</h1>
            <p>Optimize prompts for clarity, consistency, and format compliance</p>
          </header>

          <div className="app">
            {/* ── Input Panel ── */}
            <div className="panel">
              <h2>Input</h2>

              <div>
                <label>Developer / System Prompt</label>
                <textarea
                  placeholder="Enter your developer message..."
                  value={prompt}
                  onChange={e => setPrompt(e.target.value)}
                />
              </div>

              <div className="row">
                <div>
                  <label>Model</label>
                  <select value={model} onChange={e => setModel(e.target.value)}>
                    {MODELS.map(m => <option key={m} value={m}>{m}</option>)}
                  </select>
                </div>
                <div>
                  <label>Mode</label>
                  <div className="seg-control">
                    {MODES.map(m => (
                      <React.Fragment key={m.value}>
                        <input
                          type="radio" name="mode" id={`mode-${m.value}`}
                          checked={mode === m.value}
                          onChange={() => setMode(m.value)}
                        />
                        <label htmlFor={`mode-${m.value}`}>{m.label}</label>
                      </React.Fragment>
                    ))}
                  </div>
                </div>
              </div>

              <div>
                <label>Targeted Checks</label>
                <div className="checks">
                  {CHECKS.map(c => (
                    <button
                      key={c.value}
                      className={`check-btn${presetCheck === c.value ? ' active' : ''}`}
                      onClick={() => toggleCheck(c.value)}
                    >{c.label}</button>
                  ))}
                </div>
              </div>

              <div>
                <label>Custom Instruction (optional)</label>
                <input
                  type="text"
                  placeholder="e.g. Make the tone more formal"
                  value={customInstruction}
                  onChange={e => setCustom(e.target.value)}
                />
              </div>

              <button
                className="btn-primary"
                disabled={!prompt.trim() || loading}
                onClick={optimize}
              >
                {loading ? 'Optimizing…' : 'Optimize'}
              </button>
            </div>

            {/* ── Output Panel ── */}
            <div className="panel">
              <h2>Output</h2>

              {loading && (
                <div className="spinner-wrap">
                  <div className="spinner" />
                  <div className="spinner-text">Analyzing and optimizing your prompt…</div>
                </div>
              )}

              {error && <div className="error-banner">⚠️ {error}</div>}

              {!loading && !error && !result && (
                <div className="empty-state">
                  <div className="icon">✨</div>
                  <p>Enter a prompt and click Optimize to see results here.</p>
                </div>
              )}

              {result && !loading && (
                <>
                  {result.summary && (
                    <div className="summary-banner">{result.summary}</div>
                  )}

                  {result.comments?.length > 0 && (
                    <ul className="comment-list">
                      {result.comments.map((c, i) => (
                        <li key={i} className="comment-item">
                          <span className="comment-icon">
                            {c.kind === 'finding' ? '⚠️' : '✏️'}
                          </span>
                          <span>{c.reason}</span>
                        </li>
                      ))}
                    </ul>
                  )}

                  {result.new_developer_message && (
                    <div>
                      <div className="output-header">
                        <label>Optimized Prompt</label>
                        <button className="btn-copy" onClick={copyOutput}>
                          {copied ? '✓ Copied' : 'Copy'}
                        </button>
                      </div>
                      <div className="output-block">{result.new_developer_message}</div>
                    </div>
                  )}
                </>
              )}
            </div>
          </div>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
